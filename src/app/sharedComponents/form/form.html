<form [formGroup]="admissionForm">

    <h2>Application</h2>

    <!-- <div>
            <label>Group</label>
            <select formControlName="group">
                @for( g of groups;track g) {
                <option [value]="g">{{ g }}</option>
                }
            </select>
        </div> -->

    <div class="grid-3">
        <div>
            <label>First Name *</label>
            <input type="text" formControlName="firstName" />
        </div>

        <div>
            <label>Last Name *</label>
            <input type="text" formControlName="lastName" />
        </div>

        <div>
            <label>Gender *</label>
            <select formControlName="gender">
                <option value="">Select</option>
                @for(g of genders; track g) {
                <option [value]="g">{{ g }}</option>
                }
            </select>
        </div>

        <div>
            <label>Date Of Birth *</label>
            <input type="date" formControlName="dob" />
        </div>

        <div>
            <label>What Class Do you want to Admit? *</label>
            <select formControlName="admitClass">
                <option value="">Choose Your Class</option>
                @for( c of classes;track c) {
                <option [value]="c">{{ c }}</option>
                }
            </select>
        </div>


        <div>
            <label>Upload Your Photo (150 × 150px)</label>
            <input type="file" (change)="onFileChange($event, 'photo')" />
        </div>

        <div>
            <label>Upload Your Birth Certificate (PDF, jpg, png, max size 2Mb)</label>
            <input type="file" (change)="onFileChange($event, 'birthCertificate')" />
        </div>
        <div>
            <label>Upload Your Adhar Card (PDF max size 2Mb)</label>
            <input type="file" (change)="onFileChange($event, 'birthCertificate')" />
        </div>
    </div>

    <div class="mt-5"> Guardian Information</div>
    <div class="grid-3 ">
        <div>
            <label>Father Name</label>
            <input type="text" formControlName="fatherName" />
        </div>

        <div>
            <label>Mother Name</label>
            <input type="text" formControlName="motherName" />
        </div>

        <div>
            <label>Email</label>
            <input type="email" formControlName="email" />
        </div>

        <div>
            <label>Mobile No.</label>
            <input type="number" formControlName="phone" />
        </div>
        <div>
            <label>Upload Mother Photo (150 × 150px)</label>
            <input type="file" (change)="onFileChange($event, 'photo')" />
        </div>
        <div>
            <label>Upload Mother Adhar Card (PDF max size 2Mb)</label>
            <input type="file" (change)="onFileChange($event, 'birthCertificate')" />
        </div>
        <div>
            <label>Upload Father Photo (150 × 150px)</label>
            <input type="file" (change)="onFileChange($event, 'photo')" />
        </div>
        <div>
            <label>Upload Father Adhar Card (PDF max size 2Mb)</label>
            <input type="file" (change)="onFileChange($event, 'birthCertificate')" />
        </div>

    </div>



    <div class="d-flex mt-5 float-end">

        <app-button [buttonData]="buttonData" (buttonHandler)="onSubmit($event)"></app-button>
    </div>


</form>
